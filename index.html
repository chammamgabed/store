<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Store</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

#search {
    padding: 10px;
    width: 80%;
    margin: 10px;
    border-radius: 8px;
}

.product {
    margin: 20px;
}

img {
    width: 150px;
    border-radius: 10px;
    cursor: pointer;
}

.no-img {
    width: 150px;
    height: 150px;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
}

a {
    display: inline-block;
    margin-top: 10px;
    background: red;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 8px;
}

#adminPanel {
    display: none;
    margin-top: 20px;
}

#loginBox {
    display: none;
    background: #eee;
    padding: 20px;
    border-radius: 10px;
    width: 250px;
    margin: 20px auto;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>🛒 My Store</h2>

<input type="text" id="search" placeholder="🔍 Search..." onkeyup="searchProduct()">

<br><br>

<button onclick="secretClick()">🛍️ Seller Zone</button>

<!-- Login -->
<div id="loginBox">
    <h3>Seller Login</h3>
    <input type="password" id="passwordInput" placeholder="Enter password"><br><br>
    <button onclick="checkPassword()">Login</button>
    <br><br>
    <button onclick="closeLogin()">❌ Close</button>
</div>

<!-- Admin Panel -->
<div id="adminPanel">

<br>
<input type="text" id="imgInput" placeholder="Image URL"><br><br>
<input type="text" id="nameInput" placeholder="Product Name"><br><br>
<input type="text" id="linkInput" placeholder="Product Link"><br><br>

<button onclick="addProduct()">Add Product</button>

<br><br>
<button onclick="closeAdmin()">❌ Close</button>

</div>

<div id="products"></div>

<script>
const PASSWORD = "xxcb-12/+";
let products = JSON.parse(localStorage.getItem("products")) || [];
let isAdmin = false;
let clickCount = 0;

/* ===== عرض ===== */
window.onload = function() {
    displayProducts();
};

/* ===== زر سري ===== */
function secretClick() {
    clickCount++;
    if (clickCount === 10) {
        document.getElementById("loginBox").style.display = "block";
        clickCount = 0;
    }
}

/* ===== تسجيل دخول ===== */
function checkPassword() {
    let input = document.getElementById("passwordInput").value;

    if (input === PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        isAdmin = true;
    } else {
        alert("Wrong password!");
    }
}

function closeLogin() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("passwordInput").value = "";
    clickCount = 0;
}

function closeAdmin() {
    document.getElementById("adminPanel").style.display = "none";
    isAdmin = false;
}

/* ===== حفظ ===== */
function saveProducts() {
    localStorage.setItem("products", JSON.stringify(products));
}

/* ===== كلمات مترجمة ===== */
function generateKeywords(text) {
    text = text.toLowerCase();

    let words = text.split(" ");
    let keywords = [...words];

    let dictionary = {
        charger: ["chargeur", "شاحن"],
        phone: ["telephone", "هاتف"],
        cable: ["cable", "كابل"],
        fast: ["rapide", "سريع"],
        adapter: ["adaptateur", "محول"]
    };

    words.forEach(word => {
        if (dictionary[word]) {
            keywords = keywords.concat(dictionary[word]);
        }
    });

    return keywords.join(" ");
}

/* ===== إضافة ===== */
function addProduct() {
    let img = document.getElementById("imgInput").value;
    let link = document.getElementById("linkInput").value;
    let name = document.getElementById("nameInput").value;

    if (!img || !link || !name) {
        alert("Please fill all fields");
        return;
    }

    products.push({
        name: name,
        link: link,
        img: img,
        keywords: generateKeywords(name)
    });

    saveProducts();
    displayProducts();

    document.getElementById("imgInput").value = "";
    document.getElementById("nameInput").value = "";
    document.getElementById("linkInput").value = "";
}

/* ===== عرض ===== */
function displayProducts() {
    let container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach((product, index) => {
        let div = document.createElement("div");
        div.className = "product";

        let imageHTML = product.img
            ? `<img src="${product.img}" onclick="deleteImage(${index})">`
            : `<div class="no-img">No Image</div>`;

        div.innerHTML = `
            <h3>${product.name}</h3>
            ${imageHTML}
            <br>
            <a href="${product.link}" target="_blank">Buy Now</a>
        `;

        container.appendChild(div);
    });
}

/* ===== حذف صورة ===== */
function deleteImage(index) {
    if (!isAdmin) return;

    if (confirm("Delete image?")) {
        products[index].img = "";
        saveProducts();
        displayProducts();
    }
}

/* ===== بحث ===== */
function normalize(text) {
    return text.toLowerCase();
}

function searchProduct() {
    let input = normalize(document.getElementById("search").value);
    let items = document.getElementsByClassName("product");

    for (let i = 0; i < items.length; i++) {
        let name = normalize(products[i].name);
        let keywords = normalize(products[i].keywords || "");

        if (name.includes(input) || keywords.includes(input)) {
            items[i].style.display = "block";
        } else {
            items[i].style.display = "none";
        }
    }
}
</script>

</body>
</html>
