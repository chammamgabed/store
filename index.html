<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deenify</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#2c5364);
    color: white;
}

h1 {
    text-align: center;
    padding: 15px;
}

#searchBox {
    width: 90%;
    margin: 10px auto;
    display: block;
    padding: 12px;
    border-radius: 30px;
    border: none;
}

#secretBtn {
    position: fixed;
    top: 0;
    left: 0;
    width: 120px;
    height: 120px;
    opacity: 0;
}

.panel {
    display: none;
    background: white;
    color: black;
    margin: 10px;
    padding: 15px;
    border-radius: 15px;
}

#products {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 12px;
    padding: 10px;
}

.product {
    background: #1f3b4d;
    border-radius: 20px;
    overflow: hidden;
}

.product img {
    width: 100%;
    height: 140px;
    object-fit: cover;
}

.product-info {
    padding: 10px;
}

.product-info h4 {
    height: 45px;
    overflow-y: auto;
    font-size: 14px;
}

.buy {
    width: 100%;
    background: #00c6ff;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 10px;
}

.deleteBtn {
    width: 100%;
    background: black;
    color: white;
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 5px;
}
</style>
</head>

<body>

<h1>🛒 Deenify</h1>

<input id="searchBox" placeholder="🔍 Search..." onkeyup="searchProducts()">

<button id="secretBtn" onclick="openAdmin()"></button>

<!-- LOGIN -->
<div id="loginPanel" class="panel">
<h3>Admin Login</h3>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="panel">
<h3>Add Product</h3>
<input id="name" placeholder="Name"><br>
<input id="image" placeholder="Image URL"><br>
<input id="link" placeholder="Link"><br>
<button onclick="addProduct()">Add</button>
<br><br>
<button onclick="logout()">Logout</button>
</div>

<div id="products"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
"https://nuwopwcqxewkdazylanb.supabase.co",
"sb_publishable_F53GV8lPIEHfYb8hPT17SA_wH-7-t2r"
);

let tap = 0;
let isAdmin = false;
let allProducts = [];

// منتجات فورية
const fastProducts = [
{ name:"🔥 Hot Product", image:"https://i.imgur.com/8Km9tLL.jpg", link:"#"},
{ name:"⭐ Best Seller", image:"https://i.imgur.com/QlRphfQ.jpg", link:"#"}
];

// فتح/غلق admin
function openAdmin(){
    tap++;
    if(tap >= 5){
        tap = 0;

        let login = document.getElementById("loginPanel");
        let admin = document.getElementById("adminPanel");

        if(login.style.display === "block" || admin.style.display === "block"){
            login.style.display = "none";
            admin.style.display = "none";
        }else{
            login.style.display = "block";
        }

        loadProducts(); // تحديث
    }
}

// login
async function login(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(!email || !password) return;

    const { error } = await client.auth.signInWithPassword({ email, password });

    if(error){
        alert("Login error");
        return;
    }

    isAdmin = true;

    document.getElementById("loginPanel").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";

    loadProducts();
}

// logout
async function logout(){
    await client.auth.signOut();
    isAdmin = false;
    document.getElementById("adminPanel").style.display = "none";
    loadProducts();
}

// عرض
function displayProducts(products){
    let html = "";

    let adminVisible = document.getElementById("adminPanel").style.display === "block";

    products.forEach(p=>{
        html += `
        <div class="product">
            <img src="${p.image}" loading="lazy">

            <div class="product-info">
                <h4>${p.name}</h4>

                <button class="buy" onclick="
                    let link='${p.link}';
                    if(!link.startsWith('http')) link='https://' + link;
                    window.open(link)
                ">Buy</button>

                ${(isAdmin && adminVisible) 
                ? `<button class="deleteBtn" onclick="deleteProduct('${p.id}')">Delete</button>` 
                : ""}
            </div>
        </div>`;
    });

    document.getElementById("products").innerHTML = html;
}

// تحميل فوري
function instantLoad(){
    displayProducts(fastProducts);
}

// تحميل
async function loadProducts(){

    let cached = localStorage.getItem("products");

    if(cached){
        allProducts = JSON.parse(cached);
        displayProducts(allProducts);
    }

    const { data } = await client.from("products").select("*");

    if(data){
        allProducts = data;
        displayProducts(allProducts);

        localStorage.setItem("products", JSON.stringify(data));
    }
}

// إضافة
async function addProduct(){
    if(!isAdmin) return;

    let name = document.getElementById("name").value;
    let image = document.getElementById("image").value;
    let link = document.getElementById("link").value;

    await client.from("products").insert([{name, image, link}]);

    loadProducts();
}

// حذف
async function deleteProduct(id){
    await client.from("products").delete().eq("id", id);
    loadProducts();
}

// بحث
function searchProducts(){
    let value = document.getElementById("searchBox").value.toLowerCase();

    let filtered = allProducts.filter(p =>
        p.name.toLowerCase().includes(value)
    );

    displayProducts(filtered);
}

// تشغيل
instantLoad();
loadProducts();
</script>

</body>
</html>
