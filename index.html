<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Store</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

/* البحث */
#search {
    padding: 10px;
    width: 80%;
    margin: 10px;
    border-radius: 8px;
}

/* المنتج */
.product {
    margin: 20px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 10px;
}

img {
    width: 200px;
    border-radius: 10px;
}

a {
    display: inline-block;
    margin-top: 10px;
    background: red;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 8px;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>🛒 My Store</h2>

<!-- البحث -->
<input type="text" id="search" placeholder="🔍 Chercher..." onkeyup="searchProduct()">

<!-- المنتجات -->
<div id="products"></div>

<script>

/* المنتجات */
var products = [
{
name:"GaN 120W Fast Charger",
img:"https://ae01.alicdn.com/kf/Sb3c1c0e6f4c04a1d8bcb0d.jpg",
link:"https://s.click.aliexpress.com/e/_EvLztJ6"
},
{
name:"Wireless Earbuds Bluetooth",
img:"https://ae01.alicdn.com/kf/S2f4c1d8e3c5b4e7a9f2.jpg",
link:"https://s.click.aliexpress.com/e/_EvLztJ6"
}
];

/* عرض المنتجات */
function loadProducts(){
    var container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach(p=>{
        container.innerHTML += `
        <div class="product">
            <h3>${p.name}</h3>
            <img src="${p.img}">
            <br>
            <a href="${p.link}" target="_blank">🛒 Buy Now</a>
        </div>
        `;
    });
}

/* البحث */
function searchProduct(){
    var input = document.getElementById("search").value.toLowerCase();
    var productsDiv = document.getElementsByClassName("product");

    for (var i=0; i<productsDiv.length; i++){
        var name = productsDiv[i].innerText.toLowerCase();
        productsDiv[i].style.display = name.includes(input) ? "block":"none";
    }
}

/* تشغيل */
loadProducts();

</script>

</body>
</html>
