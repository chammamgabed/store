<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Store</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

#search {
    padding: 10px;
    width: 80%;
    margin: 10px;
    border-radius: 8px;
}

.product {
    margin: 20px;
}

img {
    width: 150px;
    border-radius: 10px;
    cursor: pointer;
}

.no-img {
    width: 150px;
    height: 150px;
    background: #ddd;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
}

a {
    display: inline-block;
    margin-top: 10px;
    background: red;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 8px;
}

#adminPanel {
    display: none;
    margin-top: 20px;
}

#loginBox {
    display: none;
    background: #eee;
    padding: 20px;
    border-radius: 10px;
    width: 250px;
    margin: 20px auto;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: black;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>🛒 My Store</h2>

<input type="text" id="search" placeholder="🔍 Search..." onkeyup="searchProduct()">

<br><br>

<button onclick="secretClick()">🛍️ Seller Zone</button>

<!-- Login -->
<div id="loginBox">
    <h3>Seller Login</h3>
    <input type="password" id="passwordInput" placeholder="Enter password"><br><br>
    <button onclick="checkPassword()">Login</button>
    <br><br>
    <button onclick="closeLogin()">❌ Close</button>
</div>

<!-- Admin Panel -->
<div id="adminPanel">

<br>
<input type="file" id="imgInput" accept="image/*"><br><br>
<input type="text" id="nameInput" placeholder="Product Name"><br><br>
<input type="text" id="linkInput" placeholder="Product Link"><br><br>

<button onclick="addProduct()">Add Product</button>

<br><br>
<button onclick="closeAdmin()">❌ Close</button>

</div>

<div id="products"></div>

<script>
const PASSWORD = "xxcb-12/+";
let products = JSON.parse(localStorage.getItem("products")) || [];
let isAdmin = false;
let clickCount = 0;

/* عرض */
window.onload = function() {
    displayProducts();
};

/* زر سري 10 ضغطات */
function secretClick() {
    clickCount++;

    if (clickCount === 10) {
        document.getElementById("loginBox").style.display = "block";
        clickCount = 0;
    }
}

/* login */
function checkPassword() {
    var input = document.getElementById("passwordInput").value;

    if (input === PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        isAdmin = true;
    } else {
        alert("Wrong password!");
    }
}

/* اغلاق login */
function closeLogin() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("passwordInput").value = "";
    clickCount = 0;
}

/* اغلاق admin */
function closeAdmin() {
    document.getElementById("adminPanel").style.display = "none";
    isAdmin = false;
}

/* حفظ */
function saveProducts() {
    localStorage.setItem("products", JSON.stringify(products));
}

/* إضافة */
function addProduct() {
    var file = document.getElementById("imgInput").files[0];
    var link = document.getElementById("linkInput").value;
    var name = document.getElementById("nameInput").value;

    if (!file || !link || !name) {
        alert("Please fill all fields");
        return;
    }

    var reader = new FileReader();

    reader.onload = function(e) {
        products.push({
            name: name,
            link: link,
            img: e.target.result
        });

        saveProducts();
        displayProducts();
    };

    reader.readAsDataURL(file);
}

/* عرض */
function displayProducts() {
    var container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach((product, index) => {
        var div = document.createElement("div");
        div.className = "product";

        let imageHTML = product.img 
            ? `<img src="${product.img}" onclick="deleteImage(${index})">`
            : `<div class="no-img">No Image</div>`;

        div.innerHTML = `
            <h3>${product.name}</h3>
            ${imageHTML}
            <br>
            <a href="${product.link}" target="_blank">Buy Now</a>
        `;

        container.appendChild(div);
    });
}

/* حذف الصورة (فقط admin) */
function deleteImage(index) {
    if (!isAdmin) return;

    if (confirm("Delete image?")) {
        products[index].img = "";
        saveProducts();
        displayProducts();
    }
}

/* بحث */
function searchProduct() {
    var input = document.getElementById("search").value.toLowerCase();
    var items = document.getElementsByClassName("product");

    for (var i = 0; i < items.length; i++) {
        var name = items[i].innerText.toLowerCase();
        items[i].style.display = name.includes(input) ? "block" : "none";
    }
}
</script>

</body>
</html>
