<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Store</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; text-align: center; background: #f5f5f5; }
.product { margin: 20px auto; padding: 15px; width: 90%; max-width: 320px; background: white; border-radius: 15px; }
img { width: 100%; border-radius: 10px; }
a { display: inline-block; margin-top: 10px; background: red; color: white; padding: 10px; text-decoration: none; border-radius: 8px; }
</style>
</head>

<body>

<h2>🛒 My Store</h2>

<button onclick="addTest()">➕ Add Test Product</button>

<div id="products"></div>

<script>
const supabaseUrl = "https://nuwopwcqxewkdazylanb.supabase.co";
const supabaseKey = "sb_publishable_d5NTMepIiLuHcMDltps3oQ_Jxtrcqq5";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let products = [];

window.onload = loadProducts;

async function loadProducts() {
    let { data } = await supabaseClient.from("products").select("*");
    products = data || [];
    displayProducts();
}

function displayProducts() {
    let container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach(p => {
        container.innerHTML += `
        <div class="product">
            <h3>${p.name}</h3>
            <img src="${p.img}">
            <a href="${p.link}" target="_blank">Buy</a>
        </div>`;
    });
}

async function addTest() {
    await supabaseClient.from("products").insert([{
        name: "Test Product",
        img: "https://via.placeholder.com/300",
        link: "https://aliexpress.com"
    }]);

    loadProducts();
}
</script>

</body>
</html>
