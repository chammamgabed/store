<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Store</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

/* البحث */
#search {
    padding: 10px;
    width: 80%;
    margin: 10px;
    border-radius: 8px;
}

/* المنتجات */
.product {
    margin: 20px;
}

img {
    width: 150px;
    border-radius: 10px;
}

a {
    display: inline-block;
    margin-top: 10px;
    background: red;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 8px;
}

/* admin مخفي */
#adminPanel {
    display: none;
}
</style>
</head>

<body>

<h2>🛒 My Store</h2>

<!-- البحث -->
<input type="text" id="search" placeholder="🔍 Chercher..." onkeyup="searchProduct()">

<!-- ADMIN (مخفي) -->
<div id="adminPanel">
    <h3>🔐 Admin</h3>

    <input type="file" id="imgInput" accept="image/*"><br><br>
    <input type="text" id="nameInput" placeholder="اسم المنتج"><br><br>
    <input type="text" id="linkInput" placeholder="رابط المنتج"><br><br>

    <button onclick="addProduct()">إضافة منتج</button>
    <br><br>
</div>

<!-- المنتجات -->
<div id="products"></div>

<script>

// تحميل المنتجات
let products = JSON.parse(localStorage.getItem("products")) || [];

// عرض المنتجات
function showProducts(){
    document.getElementById("products").innerHTML = "";

    products.forEach(p => {
        var div = document.createElement("div");
        div.className = "product";

        div.innerHTML = `
            <h3>${p.name}</h3>
            <img src="${p.image}">
            <br>
            <a href="${p.link}" target="_blank">Buy Now</a>
        `;

        document.getElementById("products").appendChild(div);
    });
}

// إضافة منتج
function addProduct() {
    var file = document.getElementById("imgInput").files[0];
    var link = document.getElementById("linkInput").value;
    var name = document.getElementById("nameInput").value;

    if (!file || !link || !name) {
        alert("أكمل جميع المعلومات");
        return;
    }

    var reader = new FileReader();

    reader.onload = function(e) {

        var product = {
            name: name,
            link: link,
            image: e.target.result
        };

        products.push(product);

        localStorage.setItem("products", JSON.stringify(products));

        showProducts();

        alert("تمت الإضافة ✅");
    };

    reader.readAsDataURL(file);
}

/* البحث */
function searchProduct() {
    var input = document.getElementById("search").value.toLowerCase();
    var items = document.getElementsByClassName("product");

    for (var i = 0; i < items.length; i++) {
        var name = items[i].innerText.toLowerCase();

        if (name.includes(input)) {
            items[i].style.display = "block";
        } else {
            items[i].style.display = "none";
        }
    }
}

// 🔥 زر مخفي (5 ضغطات)
let count = 0;

document.body.addEventListener("click", function(){
    count++;

    if(count >= 5){
        document.getElementById("adminPanel").style.display = "block";
        alert("تم فتح وضع Admin 🔐");
    }

    setTimeout(()=>{
        count = 0;
    }, 2000);
});

// عرض المنتجات عند فتح الموقع
showProducts();

</script>

</body>
</html>
