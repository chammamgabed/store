<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>My Store</title>
  <style>
    body {font-family: Arial; text-align: center; background:#f5f5f5;}
    .header {background:#222; color:white; padding:15px; display:flex; justify-content:space-between;}
    .cart {cursor:pointer; font-size:24px;}
    .products {display:flex; flex-wrap:wrap; justify-content:center;}
    .product {background:white; margin:10px; padding:10px; border-radius:10px; width:200px;}
    .product img {width:100%;}
    button {padding:10px; background:green; color:white; border:none;}
    input {padding:10px; margin:5px;}
  </style>
</head>

<body>

<div class="header">
  <h2>🛍️ My Store</h2>
  <div class="cart">🛒</div>
</div>

<div id="app"></div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const params = new URLSearchParams(window.location.search);
  const page = params.get("page");

  // STORE
  if(page !== "admin"){
    document.getElementById("app").innerHTML = `
      <h2>منتجاتنا</h2>
      <div class="products">
        <div class="product">
          <img src="https://via.placeholder.com/200">
          <h3>ساعة ذكية</h3>
          <p>15$</p>
        </div>
      </div>
    `;
  }

  // ADMIN
  if(page === "admin"){
    document.getElementById("app").innerHTML = `
      <h2>🔐 Admin</h2>
      <p>تم الدخول بنجاح ✅</p>
    `;
  }

  // زر مخفي
  let count = 0;
  const cart = document.querySelector(".cart");

  cart.addEventListener("click", function(){
    count++;
    console.log("click:", count); // للتأكد

    if(count >= 5){
      window.location.href = "?page=admin";
    }

    setTimeout(()=>{
      count = 0;
    }, 3000);
  });

});
</script>

</body>
</html>
