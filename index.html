<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Store</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

h2 {
    margin-top: 20px;
}

/* البحث */
#search {
    padding: 12px;
    width: 85%;
    border-radius: 10px;
    border: 2px solid #ccc;
    margin: 10px;
}

/* زر Seller */
button {
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    background: black;
    color: white;
    margin: 5px;
    cursor: pointer;
}

/* المنتج */
.product {
    background: white;
    margin: 20px auto;
    padding: 15px;
    border-radius: 15px;
    width: 90%;
    max-width: 300px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* الصورة */
.product img {
    width: 100%;
    border-radius: 10px;
}

/* زر الشراء */
.buy-btn {
    display: inline-block;
    margin-top: 10px;
    background: red;
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}

/* admin */
#adminPanel, #loginBox {
    display: none;
    background: white;
    padding: 15px;
    margin: 20px auto;
    border-radius: 10px;
    width: 90%;
    max-width: 300px;
}

input {
    padding: 10px;
    width: 90%;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
</style>
</head>

<body>

<h2>🛒 My Store</h2>

<input type="text" id="search" placeholder="🔍 Search..." onkeyup="searchProduct()">

<br>
<button onclick="secretClick()">🛍️ Seller Zone</button>

<!-- Login -->
<div id="loginBox">
    <h3>Seller Login</h3>
    <input type="password" id="passwordInput" placeholder="Password">
    <br><br>
    <button onclick="checkPassword()">Login</button>
</div>

<!-- Admin -->
<div id="adminPanel">
    <input type="text" id="imgInput" placeholder="Image URL">
    <input type="text" id="nameInput" placeholder="Product Name">
    <input type="text" id="linkInput" placeholder="Product Link">
    <br><br>
    <button onclick="addProduct()">Add Product</button>
    <button onclick="closeAdmin()">❌ Close</button>
</div>

<div id="products"></div>

<script>
const PASSWORD = "xxcb-12";
let products = JSON.parse(localStorage.getItem("products")) || [];
let isAdmin = false;
let clickCount = 0;

window.onload = displayProducts;

/* زر سري */
function secretClick() {
    clickCount++;
    if (clickCount === 10) {
        document.getElementById("loginBox").style.display = "block";
        clickCount = 0;
    }
}

/* تسجيل دخول */
function checkPassword() {
    let pass = document.getElementById("passwordInput").value;

    if (pass === PASSWORD) {
        isAdmin = true;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
    } else {
        alert("Wrong password");
    }
}

/* غلق */
function closeAdmin() {
    document.getElementById("adminPanel").style.display = "none";
    isAdmin = false;
}

/* حفظ */
function saveProducts() {
    localStorage.setItem("products", JSON.stringify(products));
}

/* إضافة */
function addProduct() {
    let img = document.getElementById("imgInput").value.trim();
    let name = document.getElementById("nameInput").value.trim();
    let link = document.getElementById("linkInput").value.trim();

    if (!img || !name || !link) {
        alert("Fill all fields");
        return;
    }

    products.push({ img, name, link });
    saveProducts();
    displayProducts();

    document.getElementById("imgInput").value = "";
    document.getElementById("nameInput").value = "";
    document.getElementById("linkInput").value = "";
}

/* عرض */
function displayProducts() {
    let container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach(p => {
        container.innerHTML += `
        <div class="product">
            <h3>${p.name}</h3>
            <img src="${p.img}" onerror="this.style.display='none'">
            <a href="${p.link}" target="_blank" class="buy-btn">Buy Now</a>
        </div>
        `;
    });
}

/* بحث */
function searchProduct() {
    let input = document.getElementById("search").value.toLowerCase();
    let items = document.getElementsByClassName("product");

    for (let i = 0; i < items.length; i++) {
        let text = items[i].innerText.toLowerCase();
        items[i].style.display = text.includes(input) ? "block" : "none";
    }
}
</script>

</body>
</html>
