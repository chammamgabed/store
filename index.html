<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>My Store</title>
  <style>
    body {font-family: Arial; text-align: center; background:#f5f5f5;}
    .header {background:#222; color:white; padding:15px;}
    .products {display:flex; flex-wrap:wrap; justify-content:center;}
    .product {background:white; margin:10px; padding:10px; border-radius:10px; width:200px;}
    .product img {width:100%;}
  </style>
</head>

<body>

<div class="header">
  <h2>🛍️ My Store</h2>
</div>

<div id="app"></div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const params = new URLSearchParams(window.location.search);
  const page = params.get("page");

  // STORE
  if(page !== "admin"){
    document.getElementById("app").innerHTML = `
      <h2>منتجاتنا</h2>
      <div class="products">
        <div class="product">
          <img src="https://via.placeholder.com/200">
          <h3>ساعة ذكية</h3>
          <p>15$</p>
        </div>
      </div>
    `;
  }

  // ADMIN
  if(page === "admin"){
    document.getElementById("app").innerHTML = `
      <h2>🔐 Admin Panel</h2>
      <p>تم الدخول بنجاح ✅</p>
    `;
  }

  // 🔥 الضغط في أي مكان 5 مرات
  let count = 0;

  document.body.addEventListener("click", function(){
    count++;
    console.log("click:", count);

    if(count >= 5){
      window.location.href = "?page=admin";
    }

    // يرجع للصفر بعد 2 ثواني
    setTimeout(()=>{
      count = 0;
    }, 2000);
  });

});
</script>

</body>
</html>
